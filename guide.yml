name: monaco-lsp-dynamic-setup
version: 1.0.0
description: >
  AI Agent instruction set for setting up Monaco Editor with dynamic LSP support.
  No pre-installed language extensions. No memory-based file system.
  LSP server is external (WebSocket). Language detected from file extension at runtime.

# ============================================================
# OVERVIEW
# ============================================================
overview:
  goal: >
    When a user opens a file in the editor, dynamically:
    1. Detect the language from the file extension
    2. Install and import ONLY that language's @codingame extension
    3. Connect to the WebSocket LSP server with ?language=<id> query param
    4. Mount the real file (from disk or remote URL — NO in-memory FS)
    5. Tear down the previous LSP client cleanly before starting a new one

  what_NOT_to_do:
    - DO NOT pre-import any @codingame language extensions at the top of files
    - DO NOT use RegisteredFileSystemProvider or RegisteredMemoryFile
    - DO NOT hardcode language extensions in a static switch/case
    - DO NOT start multiple LanguageClientWrappers simultaneously
    - DO NOT call initEditorApi() more than once

# ============================================================
# PACKAGE VERSIONS
# ============================================================
packages:
  critical_note: >
    ALL @codingame/* packages MUST share the same version number.
    Check monaco-languageclient version first, then match @codingame version.

  check_versions:
    command: |
      node -e "console.log(require('./node_modules/monaco-languageclient/package.json').version)"
      node -e "console.log(require('./node_modules/@codingame/monaco-vscode-api/package.json').version)"

  version_compatibility_table:
    - monaco_languageclient: "8.x"
      codingame_version: "@3"
    - monaco_languageclient: "9.x"
      codingame_version: "@9"
    - monaco_languageclient: "10.4.x"
      codingame_version: "@23"
    - monaco_languageclient: "10.5.x"
      codingame_version: "@25"

  required_base:
    - monaco-languageclient
    - "@codingame/monaco-vscode-api"
    - "@codingame/monaco-vscode-files-service-override"
    - "@codingame/esbuild-import-meta-url-plugin"  # dev
    - import-meta-resolve@2.2.1                     # dev — Windows fix

  language_extensions:
    install_strategy: on-demand
    note: >
      DO NOT install all extensions upfront. Only install what the project needs.
      Use dynamic import() at runtime — not static imports at file top.
    available_packages:
      json:       "@codingame/monaco-vscode-json-default-extension"
      python:     "@codingame/monaco-vscode-python-default-extension"
      typescript: "@codingame/monaco-vscode-typescript-default-extension"
      javascript: "@codingame/monaco-vscode-javascript-default-extension"
      css:        "@codingame/monaco-vscode-css-default-extension"
      scss:       "@codingame/monaco-vscode-css-default-extension"
      html:       "@codingame/monaco-vscode-html-default-extension"
      go:         "@codingame/monaco-vscode-go-default-extension"
      rust:       "@codingame/monaco-vscode-rust-default-extension"
      java:       "@codingame/monaco-vscode-java-default-extension"
      cpp:        "@codingame/monaco-vscode-cpp-default-extension"
      csharp:     "@codingame/monaco-vscode-csharp-default-extension"
      yaml:       "@codingame/monaco-vscode-yaml-default-extension"

# ============================================================
# VITE CONFIG — Windows Compatible
# ============================================================
vite_config:
  file: vite.config.ts
  windows_note: >
    On Windows, import-meta-resolve fails with backslash paths.
    Pin import-meta-resolve@2.2.1 and use EXCLUDE (not include) in optimizeDeps.
    Add "overrides" in package.json to force the pinned version everywhere.

  package_json_override:
    add_to_package_json: |
      "overrides": {
        "import-meta-resolve": "2.2.1"
      }

  config: |
    import { defineConfig } from 'vite'
    import react from '@vitejs/plugin-react'
    import importMetaUrlPlugin from '@codingame/esbuild-import-meta-url-plugin'

    export default defineConfig({
      plugins: [react()],

      worker: {
        format: 'es'
      },

      optimizeDeps: {
        exclude: [
          'monaco-editor',
          'monaco-languageclient',
          '@codingame/monaco-vscode-api',
          '@codingame/monaco-vscode-files-service-override',
          'vscode',
          'vscode-languageserver-protocol',
        ],
        esbuildOptions: {
          plugins: [importMetaUrlPlugin]
        }
      },

      build: {
        target: 'esnext',
        rollupOptions: {
          output: { format: 'es' }
        }
      },

      esbuild: {
        target: 'esnext'
      }
    })

  clear_cache_after_changes:
    windows: |
      rd /s /q node_modules\.vite
      rd /s /q dist
      npm run dev
    unix: |
      rm -rf node_modules/.vite dist
      npm run dev

# ============================================================
# FILE STRUCTURE
# ============================================================
file_structure:
  src:
    editor:
      - languageMap.ts       # ext → languageId
      - extensionLoader.ts   # dynamic import of @codingame extension (NO static imports)
      - editorSetup.ts       # MonacoVscodeApiWrapper — init ONCE
      - lspManager.ts        # LanguageClientWrapper — start/stop per file open
    test.tsx
    demo.tsx

# ============================================================
# STEP 1 — languageMap.ts
# ============================================================
step_1_language_map:
  file: src/editor/languageMap.ts
  purpose: Map file extension → LSP language ID
  instruction: >
    Agent must use this map to derive languageId from filename.
    Never hardcode language in the editor setup directly.
  code: |
    export function getLanguageId(filename: string): string {
      const ext = filename.split('.').pop()?.toLowerCase() ?? '';
      const map: Record<string, string> = {
        py:    'python',
        ts:    'typescript',
        tsx:   'typescriptreact',
        js:    'javascript',
        jsx:   'javascriptreact',
        json:  'json',
        go:    'go',
        rs:    'rust',
        java:  'java',
        cpp:   'cpp',
        c:     'c',
        cs:    'csharp',
        css:   'css',
        scss:  'scss',
        html:  'html',
        md:    'markdown',
        yaml:  'yaml',
        yml:   'yaml',
      };
      return map[ext] ?? 'plaintext';
    }

# ============================================================
# STEP 2 — extensionLoader.ts
# ============================================================
step_2_extension_loader:
  file: src/editor/extensionLoader.ts
  purpose: >
    Dynamically import the @codingame language extension at runtime.
    NO static imports at top of file. NO switch/case with all languages pre-listed.
    Agent builds this dynamically based on what packages are installed.
  critical_rules:
    - Only import the extension for the language currently being opened
    - Track which extensions are already loaded to avoid re-importing
    - If package is not installed, catch the error and warn — do not crash
    - Never import ALL extensions at startup

  code: |
    // Tracks already-loaded extensions to avoid duplicate imports
    const loadedExtensions = new Set<string>();

    // Map languageId → npm package name
    const EXTENSION_PACKAGES: Record<string, string> = {
      json:             '@codingame/monaco-vscode-json-default-extension',
      python:           '@codingame/monaco-vscode-python-default-extension',
      typescript:       '@codingame/monaco-vscode-typescript-default-extension',
      typescriptreact:  '@codingame/monaco-vscode-typescript-default-extension',
      javascript:       '@codingame/monaco-vscode-javascript-default-extension',
      javascriptreact:  '@codingame/monaco-vscode-javascript-default-extension',
      css:              '@codingame/monaco-vscode-css-default-extension',
      scss:             '@codingame/monaco-vscode-css-default-extension',
      html:             '@codingame/monaco-vscode-html-default-extension',
      go:               '@codingame/monaco-vscode-go-default-extension',
      rust:             '@codingame/monaco-vscode-rust-default-extension',
      java:             '@codingame/monaco-vscode-java-default-extension',
      cpp:              '@codingame/monaco-vscode-cpp-default-extension',
      csharp:           '@codingame/monaco-vscode-csharp-default-extension',
      yaml:             '@codingame/monaco-vscode-yaml-default-extension',
    };

    export async function loadLanguageExtension(languageId: string): Promise<void> {
      // Already loaded — skip
      if (loadedExtensions.has(languageId)) return;

      const packageName = EXTENSION_PACKAGES[languageId];
      if (!packageName) {
        console.warn(`[extensionLoader] No @codingame extension mapped for: ${languageId}`);
        return;
      }

      try {
        await import(/* @vite-ignore */ packageName);
        loadedExtensions.add(languageId);
        console.log(`[extensionLoader] Loaded extension for: ${languageId}`);
      } catch (err) {
        console.error(
          `[extensionLoader] Failed to load extension "${packageName}".`,
          `Did you run: npm install ${packageName}@<version> ?`,
          err
        );
      }
    }

# ============================================================
# STEP 3 — editorSetup.ts
# ============================================================
step_3_editor_setup:
  file: src/editor/editorSetup.ts
  purpose: >
    Initialize MonacoVscodeApiWrapper ONCE for the entire app lifetime.
    Never call this more than once — it throws if called twice.
  critical_rules:
    - Guard with a boolean flag — if already started, return immediately
    - NO file system setup here (no RegisteredFileSystemProvider)
    - htmlContainer is the DOM element passed from React ref

  code: |
    import {
      MonacoVscodeApiWrapper,
      type MonacoVscodeApiConfig
    } from 'monaco-languageclient/vscodeApiWrapper';
    import { configureDefaultWorkerFactory } from 'monaco-languageclient/workerFactory';
    import { LogLevel } from '@codingame/monaco-vscode-api';

    let started = false;

    export async function initEditorApi(htmlContainer: HTMLElement): Promise<void> {
      if (started) return;
      started = true;

      const config: MonacoVscodeApiConfig = {
        $type: 'extended',
        viewsConfig: {
          $type: 'EditorService',
          htmlContainer
        },
        logLevel: LogLevel.Info,
        userConfiguration: {
          json: JSON.stringify({
            'workbench.colorTheme':                    'Default Dark Modern',
            'editor.fontSize':                          14,
            'editor.tabSize':                           2,
            'editor.fontFamily':                        'Fira Code, Consolas, monospace',
            'editor.wordWrap':                          'on',
            'editor.minimap.enabled':                   true,
            'editor.lineNumbers':                       'on',
            'editor.quickSuggestions':                  true,
            'editor.wordBasedSuggestions':              'off',
            'editor.parameterHints.enabled':            true,
            'editor.lightbulb.enabled':                 'On',
            'editor.guides.bracketPairsHorizontal':     'active',
            'editor.experimental.asyncTokenization':    true
          })
        },
        monacoWorkerFactory: configureDefaultWorkerFactory
      };

      const wrapper = new MonacoVscodeApiWrapper(config);
      await wrapper.start();
    }

# ============================================================
# STEP 4 — lspManager.ts
# ============================================================
step_4_lsp_manager:
  file: src/editor/lspManager.ts
  purpose: >
    Manage the LanguageClientWrapper lifecycle.
    On every file open: stop previous client, load extension, start new client.
    NO in-memory file system. File is referenced by its real URI (file:// or http://).
  critical_rules:
    - Always stop the previous LanguageClientWrapper before starting a new one
    - Pass the real file URI — not a fake /workspace/ path
    - WebSocket URL must include ?language=<languageId> query param
    - EditorApp is started ONCE, then reused with updated codeResources
    - Do NOT use RegisteredFileSystemProvider or RegisteredMemoryFile anywhere

  websocket_url_pattern: "ws://localhost:30000/lsp?language={languageId}"

  code: |
    import {
      LanguageClientWrapper,
      type LanguageClientConfig
    } from 'monaco-languageclient/lcwrapper';
    import {
      EditorApp,
      type EditorAppConfig
    } from 'monaco-languageclient/editorApp';
    import * as vscode from 'vscode';
    import { loadLanguageExtension } from './extensionLoader';
    import { getLanguageId } from './languageMap';

    const WS_BASE = 'ws://localhost:30000/lsp';

    let currentLcWrapper:  LanguageClientWrapper | null = null;
    let currentEditorApp:  EditorApp | null = null;

    export async function openFileInEditor(
      htmlContainer: HTMLElement,
      fileUri: string,     // real URI: 'file:///C:/project/main.py' or 'https://...'
      filename: string,    // just for extension detection: 'main.py'
      content: string      // file content as string
    ): Promise<void> {

      // 1. Detect language from extension
      const languageId = getLanguageId(filename);
      console.log(`[lspManager] Opening: ${filename} → language: ${languageId}`);

      // 2. Dynamically load only the needed @codingame extension
      await loadLanguageExtension(languageId);

      // 3. Stop previous LSP client if one is running
      if (currentLcWrapper) {
        console.log('[lspManager] Stopping previous LSP client...');
        await currentLcWrapper.stop();
        currentLcWrapper = null;
      }

      // 4. Build WebSocket URL with language query param
      const wsUrl = `${WS_BASE}?language=${languageId}`;
      console.log(`[lspManager] Connecting to: ${wsUrl}`);

      // 5. Language client config
      const languageClientConfig: LanguageClientConfig = {
        languageId,
        connection: {
          options: {
            $type: 'WebSocketUrl',
            url: wsUrl
          }
        },
        clientOptions: {
          documentSelector: [languageId],
          workspaceFolder: {
            index: 0,
            name: 'workspace',
            uri: vscode.Uri.parse(fileUri).with({ path: '/' })
          }
        }
      };

      // 6. Editor app config — use REAL file URI, no in-memory FS
      const editorAppConfig: EditorAppConfig = {
        codeResources: {
          modified: {
            text: content,
            uri: fileUri        // ← real file URI passed directly
          }
        }
      };

      // 7. Start EditorApp once, or update it on subsequent opens
      if (!currentEditorApp) {
        currentEditorApp = new EditorApp(editorAppConfig);
        await currentEditorApp.start(htmlContainer);
      }

      // 8. Start the new LSP client
      currentLcWrapper = new LanguageClientWrapper(languageClientConfig);
      await currentLcWrapper.start();

      console.log(`[lspManager] ✅ LSP ready for: ${languageId}`);
    }

    export async function stopLsp(): Promise<void> {
      if (currentLcWrapper) {
        await currentLcWrapper.stop();
        currentLcWrapper = null;
        console.log('[lspManager] LSP stopped.');
      }
    }

# ============================================================
# STEP 5 — test.tsx
# ============================================================
step_5_app:
  file: src/test.tsx
  purpose: >
    React component. Initializes editor API on mount.
    Calls openFileInEditor when user selects a file.
    Passes real file URI — not a fake path.
  code: |
    import { useEffect, useRef, useState } from 'react';
    import { initEditorApi } from './editor/editorSetup';
    import { openFileInEditor, stopLsp } from './editor/lspManager';

    // Replace with your real file list from API/disk
    const FILES = [
      {
        name: 'main.py',
        uri: 'file:///C:/project/main.py',
        content: 'def hello():\n    print("Hello")\n'
      },
      {
        name: 'index.ts',
        uri: 'file:///C:/project/index.ts',
        content: 'const greet = (name: string) => `Hello ${name}`;\n'
      },
    ];

    export default function App() {
      const containerRef = useRef<HTMLDivElement>(null);
      const [ready, setReady]       = useState(false);
      const [activeFile, setActive] = useState<string | null>(null);

      useEffect(() => {
        async function init() {
          if (!containerRef.current) return;
          await initEditorApi(containerRef.current);  // ← once only
          setReady(true);
        }
        init();
        return () => { stopLsp(); };
      }, []);

      async function handleOpen(file: typeof FILES[0]) {
        if (!ready || !containerRef.current) return;
        setActive(file.name);
        await openFileInEditor(
          containerRef.current,
          file.uri,       // ← real URI
          file.name,      // ← for language detection
          file.content    // ← file content
        );
      }

      return (
        <div style={{ display: 'flex', height: '100vh' }}>
          <div style={{ width: 200, background: '#1e1e1e', padding: 8 }}>
            {FILES.map(f => (
              <div
                key={f.name}
                onClick={() => handleOpen(f)}
                style={{
                  padding: '4px 8px',
                  cursor: 'pointer',
                  color: activeFile === f.name ? '#fff' : '#aaa',
                  background: activeFile === f.name ? '#37373d' : 'transparent',
                  borderRadius: 4,
                  fontSize: 13
                }}
              >
                {f.name}
              </div>
            ))}
          </div>
          <div ref={containerRef} style={{ flex: 1 }} />
        </div>
      );
    }

# ============================================================
# AGENT DECISION RULES
# ============================================================
agent_rules:

  on_file_open:
    steps:
      - step: 1
        action: getLanguageId(filename)
        note: Always derive from file extension — never hardcode

      - step: 2
        action: loadLanguageExtension(languageId)
        note: >
          Dynamic import only. Check loadedExtensions Set first.
          If package not installed → warn, do not crash.

      - step: 3
        action: stop currentLcWrapper if not null
        note: Always await the stop() before starting a new one

      - step: 4
        action: build wsUrl = WS_BASE + '?language=' + languageId
        note: Backend reads this param to spawn correct LSP process

      - step: 5
        action: new LanguageClientWrapper(config).start()
        note: One wrapper per open file — never run two simultaneously

  on_language_not_found:
    action: log warning, set languageId to 'plaintext', skip LSP connection
    note: Editor still opens, just without LSP features

  on_extension_load_failure:
    action: >
      Log error with install command hint.
      Continue opening file — editor works, LSP may not.
    hint_message: "npm install @codingame/monaco-vscode-{language}-default-extension@{version}"

  on_websocket_failure:
    action: >
      Log connection error. Editor remains open.
      LSP features unavailable until server is reachable.
    note: Do not crash the app on WS failure

  never_do:
    - Import @codingame extensions statically at top of any file
    - Use RegisteredFileSystemProvider or RegisteredMemoryFile
    - Call initEditorApi() more than once
    - Run two LanguageClientWrappers at the same time
    - Hardcode /workspace/ paths — use real URIs

# ============================================================
# FLOW DIAGRAM
# ============================================================
flow:
  user_opens_file:
    - getLanguageId(filename)            → 'python'
    - loadLanguageExtension('python')    → dynamic import @codingame/...python...
    - stop old LanguageClientWrapper     → await .stop()
    - wsUrl = ws://localhost:30000/lsp?language=python
    - new LanguageClientWrapper(wsUrl)   → .start()
    - EditorApp renders real file URI    → no in-memory FS needed
    - Monaco connected to Python LSP     → ✅ IntelliSense, errors, hover

  user_switches_file:
    - getLanguageId('index.ts')          → 'typescript'
    - loadLanguageExtension('typescript')→ already loaded? skip. else dynamic import
    - stop Python LanguageClientWrapper  → await .stop()
    - wsUrl = ws://localhost:30000/lsp?language=typescript
    - new LanguageClientWrapper(wsUrl)   → .start()
    - Monaco connected to TS LSP         → ✅